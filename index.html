<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORCET Warriors Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --bg-light: #f1f5f9; 
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .header { 
            text-align: center; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            color: white;
            border-radius: 0 0 25px 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .container { width: 100%; max-width: 800px; margin: auto; padding: 15px; box-sizing: border-box; }
        .grid-container { display: flex; flex-direction: column; gap: 12px; }
        .test-card { background: var(--card-bg); border: 1px solid #e2e8f0; padding: 18px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .start-btn { background: #eff6ff; color: var(--primary); padding: 8px 15px; border-radius: 8px; font-weight: 600; }

        #test-frame-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 9999;
        }

        /* Sab normal kar diya hai, koi margin ya hide logic nahi hai */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            display: block;
        }

        #denied { text-align: center; margin-top: 100px; color: #dc2626; padding: 20px; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header">
        <h1>NORCET WARRIORS</h1>
        <p>Premium Learning Portal</p>
    </div>
    <div class="container">
        <div class="grid-container" id="test-list"></div>
    </div>
</div>

<div id="test-frame-container">
    <iframe id="test-iframe" src=""></iframe>
</div>

<div id="denied" style="display:none;">
    <h2>🔒 Access Denied</h2>
    <p id="my-id"></p>
    <p>Please contact Admin for access.</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const allowedUsers = [5571185892]; 
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
    const totalTests = 147; 

    const backButton = tg.BackButton;
    tg.disableClosingConfirmation();

    if (userId && allowedUsers.includes(userId)) {
        document.getElementById('main-view').style.display = 'block';
        generateTestList();
    } else {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('denied').style.display = 'block';
        document.getElementById('my-id').innerText = "ID: " + (userId || "Not Detected");
    }

    function generateTestList() {
        const container = document.getElementById('test-list');
        for (let i = 1; i <= totalTests; i++) {
            const card = document.createElement('div');
            card.className = 'test-card';
            card.onclick = () => openTest(i); 
            card.innerHTML = `<h3>Test ${i}</h3><div class="start-btn">Start Test →</div>`;
            container.appendChild(card);
        }
    }

    function openTest(num) {
        const iframe = document.getElementById('test-iframe');
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('test-frame-container').style.display = 'block';
        
        const url1 = `test${num}.html`;
        iframe.src = url1;

        // Smart detection for space in name
        fetch(url1).then(r => { if(!r.ok) iframe.src = `test ${num}.html`; })
                   .catch(() => iframe.src = `test ${num}.html`);

        backButton.show();
    }

    backButton.onClick(() => {
        document.getElementById('test-frame-container').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('test-iframe').src = ""; 
        backButton.hide();
    });
</script>
</body>
</html>
