<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORCET Warriors Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --p-color: #00d2ff; --s-color: #3a7bd5; --bg: #0f172a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        .header { text-align: center; padding: 30px 0; background: linear-gradient(135deg, var(--p-color), var(--s-color)); border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h1 { margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .test-card { 
            background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 15px; 
            text-align: center; transition: 0.3s; cursor: pointer; position: relative; overflow: hidden;
        }
        .test-card:hover { transform: translateY(-5px); border-color: var(--p-color); background: #334155; }
        .test-card h3 { margin: 0; font-size: 16px; color: #f8fafc; }
        .test-card p { font-size: 12px; color: #94a3b8; margin: 5px 0 0; }
        
        #denied { text-align: center; margin-top: 100px; color: #ff4757; }
        .lock-icon { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="access-granted" style="display:none;">
    <div class="header">
        <h1>NORCET WARRIORS</h1>
        <p>Premium Test Portal</p>
    </div>
    
    <div class="grid-container" id="test-list">
        </div>
</div>

<div id="denied" style="display:none;">
    <div class="lock-icon">🔒</div>
    <h2>Access Denied</h2>
    <p id="my-id" style="color: #94a3b8;"></p>
    <p>Contact Admin to get Access</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const allowedUsers = [5571185892];
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

    if (userId && allowedUsers.includes(userId)) {
        document.getElementById('access-granted').style.display = 'block';
        generateTestList();
    } else {
        document.getElementById('denied').style.display = 'block';
        document.getElementById('my-id').innerText = "Your ID: " + (userId || "Not Detected");
    }

    function generateTestList() {
        const container = document.getElementById('test-list');
        // 1 se 96 tak cards banane ke liye loop
        for (let i = 1; i <= 96; i++) {
            const card = document.createElement('div');
            card.className = 'test-card';
            card.onclick = () => { window.location.href = `test${i}.html`; };
            card.innerHTML = `
                <h3>Test ${i}</h3>
                <p>50 Questions</p>
            `;
            container.appendChild(card);
        }
    }
</script>

</body>
</html>
