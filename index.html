<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NORCET Warriors Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #2563eb; --bg-light: #f1f5f9; --card-bg: #ffffff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: var(--bg-light);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Header */
        .header { text-align: center; padding: 30px 10px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border-radius: 0 0 20px 20px; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .grid-container { display: flex; flex-direction: column; gap: 10px; }
        .test-card { background: white; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .start-btn { background: #eff6ff; color: var(--primary); padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 13px; }

        /* Test Container */
        #test-frame-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            overflow: hidden;
        }

        /* Iframe Styling: Admin Bar Hide karne ke liye safe margin */
        iframe { 
            width: 100%; 
            height: calc(100% + 45px); /* Sirf 45px badhaya hai taaki zyada zoom na ho */
            margin-top: -45px; /* Admin bar ko upar bhej diya */
            border: none;
            display: block;
        }

        #denied { text-align: center; margin-top: 100px; color: #dc2626; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header">
        <h1>NORCET WARRIORS</h1>
        <p>Premium Learning Portal</p>
    </div>
    <div class="container">
        <div class="grid-container" id="test-list"></div>
    </div>
</div>

<div id="test-frame-container">
    <iframe id="test-iframe" src=""></iframe>
</div>

<div id="denied" style="display:none;">
    <h2>🔒 Access Denied</h2>
    <p id="my-id"></p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const allowedUsers = [5571185892]; 
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
    const totalTests = 147;

    const backButton = tg.BackButton;
    tg.disableClosingConfirmation();

    if (userId && allowedUsers.includes(userId)) {
        document.getElementById('main-view').style.display = 'block';
        generateTestList();
    } else {
        document.getElementById('denied').style.display = 'block';
        document.getElementById('my-id').innerText = "ID: " + (userId || "Not Detected");
    }

    function generateTestList() {
        const container = document.getElementById('test-list');
        for (let i = 1; i <= totalTests; i++) {
            const card = document.createElement('div');
            card.className = 'test-card';
            card.onclick = () => openTest(i); 
            card.innerHTML = `<h3>Test ${i}</h3><div class="start-btn">Start Test →</div>`;
            container.appendChild(card);
        }
    }

    function openTest(num) {
        const iframe = document.getElementById('test-iframe');
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('test-frame-container').style.display = 'block';
        
        const url1 = `test${num}.html`;
        iframe.src = url1;

        fetch(url1).then(r => { if(!r.ok) iframe.src = `test ${num}.html`; })
                   .catch(() => iframe.src = `test ${num}.html`);

        backButton.show();
    }

    backButton.onClick(() => {
        document.getElementById('test-frame-container').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('test-iframe').src = ""; 
        backButton.hide();
    });
</script>
</body>
</html>
