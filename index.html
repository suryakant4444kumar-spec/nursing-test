<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NORCET Warriors Portal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --p-color: #248bca; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: none; }
        .header { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .test-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e0e6ed; }
        .btn { background: var(--p-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; }
        
        /* Question Section */
        #quiz-section { display: none; padding: 20px; background: white; min-height: 100vh; }
        .question { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .option { display: block; padding: 12px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; cursor: pointer; }
        .option:hover { background: #f0f7ff; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header">
            <h1>NORCET WARRIORS</h1>
            <p>Select Your Test</p>
        </div>
        <div class="container">
            <div class="test-card">
                <div><h3>Nursing Test - 01</h3><p>50 Questions</p></div>
                <button class="btn" onclick="startTest()">Start</button>
            </div>
            </div>
    </div>

    <div id="quiz-section">
        <button onclick="location.reload()" style="margin-bottom:20px;">⬅ Back</button>
        <div class="question" id="q-text">1. Loading question...</div>
        <div id="options-container"></div>
    </div>

    <div id="denied" style="display:none; text-align:center; padding:50px;">
        <h2 style="color:red;">Access Denied 🔒</h2>
        <p id="my-id"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 📝 ID ALLOW LIST (Yahan apni ID dalna na bhulein)
        const allowedUsers = [5571185892]; 
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

        if (userId && allowedUsers.includes(userId)) {
            document.body.style.display = 'block';
        } else {
            document.body.style.display = 'block';
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('denied').style.display = 'block';
            document.getElementById('my-id').innerText = "Aapki ID: " + (userId || "Not Found");
        }

        function startTest() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('q-text').innerText = "1. A patient presents with rough, dry, scaly skin patches. Which nutrient deficiency is likely?";
            const options = ["Vitamin A", "Vitamin C", "Iron", "Vitamin D"];
            let html = "";
            options.forEach(opt => {
                html += `<div class="option" onclick="alert('Answer Saved!')">${opt}</div>`;
            });
            document.getElementById('options-container').innerHTML = html;
        }
    </script>
</body>
</html>
