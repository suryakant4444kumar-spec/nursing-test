<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Officer Test Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4895ef;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* Header Styling */
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        header p {
            opacity: 0.9;
            font-size: 14px;
            margin-top: 10px;
        }

        .container {
            max-width: 1100px;
            margin: -30px auto 50px;
            padding: 0 15px;
        }

        /* Grid Styling */
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* Button Styling */
        .test-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .test-card span {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .test-card strong {
            font-size: 18px;
            color: var(--primary);
        }

        /* Hover Effect */
        .test-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 15px rgba(67, 97, 238, 0.15);
            background: #f1f5ff;
        }

        .test-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .test-card:hover::after {
            transform: scaleX(1);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            font-size: 13px;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .test-grid { grid-template-columns: repeat(3, 1fr); padding: 15px; }
            header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Nursing Officer Test Portal</h1>
        <p>Total 96 Quality Tests Available</p>
    </header>

    <div class="container">
        <div class="test-grid" id="testContainer">
            </div>
    </div>

    <footer>
        &copy; 2024 Nursing Quiz Portal | Designed for Excellence
    </footer>

    <script>
        const container = document.getElementById('testContainer');
        
        for (let i = 1; i <= 96; i++) {
            const card = document.createElement('a');
            card.href = `test${i}.html`;
            card.className = 'test-card';
            card.innerHTML = `
                <span>TEST</span>
                <strong>${i}</strong>
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
